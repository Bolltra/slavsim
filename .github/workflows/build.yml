name: build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Build Core
        run: dotnet build src/Mx43Sim.Core/Mx43Sim.Core.csproj -c Release --nologo

      - name: Build Tests
        run: dotnet build src/Mx43Sim.Tests/Mx43Sim.Tests.csproj -c Release --nologo

      - name: Build App
        run: dotnet build src/Mx43Sim.App/Mx43Sim.App.csproj -c Release --nologo

      - name: Run tests
        run: dotnet run --project src/Mx43Sim.Tests/Mx43Sim.Tests.csproj -c Release
