name: release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag name (e.g. v0.1.0)'
        required: true

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Read tag name
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            echo "name=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          else
            echo "name=${{ github.event.inputs.tag }}" >> $GITHUB_OUTPUT
          fi

      - name: Publish self-contained Windows build
        run: |
          dotnet publish src/Mx43Sim.App/Mx43Sim.App.csproj \
            -c Release \
            -r win-x64 \
            --self-contained true \
            -p:PublishSingleFile=false \
            -p:DebugType=embedded \
            -o publish/win-x64

      - name: Package as zip
        run: |
          cd publish
          zip -r "../Mx43Sim-${{ steps.tag.outputs.name }}-win-x64.zip" win-x64
          cd ..
          ls -la "Mx43Sim-${{ steps.tag.outputs.name }}-win-x64.zip"

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ steps.tag.outputs.name }}
          generate_release_notes: true
          files: |
            Mx43Sim-${{ steps.tag.outputs.name }}-win-x64.zip
            LICENSE
          fail_on_unmatched_files: false
